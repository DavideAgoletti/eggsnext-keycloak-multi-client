name: Build Keycloak Images

on:
  push:
    branches: [main]
    paths:
      - 'clients/**'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:
    inputs:
      client:
        description: 'Client name (leave empty for all)'
        required: false
      keycloak_version:
        description: 'Keycloak version'
        required: false
        default: '24.0.0'

env:
  REGISTRY: ghcr.io
  REGISTRY_USERNAME: ${{ github.actor }}

jobs:
  detect-clients:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect clients
        id: set-matrix
        run: |
          if [ -z "${{ github.event.inputs.client }}" ]; then
            # Se non specificato, build tutti i client
            clients=$(ls -d clients/*/ | sed 's|clients/||g' | sed 's|/||g' | jq -R -s -c 'split("\n")[:-1]')
          else
            # Altrimenti build solo il client specificato
            clients=$(echo "${{ github.event.inputs.client }}" | jq -R -s -c 'split("\n")[:-1]')
          fi
          echo "matrix={\"client\":$(echo $clients | jq -c .)}" >> $GITHUB_OUTPUT

  build:
    needs: detect-clients
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-clients.outputs.matrix) }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          # Leggi la versione di Keycloak dal file config del cliente
          if [ -f "clients/${{ matrix.client }}/config.env" ]; then
            KC_VERSION=$(grep KEYCLOAK_VERSION clients/${{ matrix.client }}/config.env | cut -d= -f2)
          else
            KC_VERSION="${{ github.event.inputs.keycloak_version }}"
            KC_VERSION="${KC_VERSION:-24.0.0}"
          fi
          
          echo "keycloak-version=$KC_VERSION" >> $GITHUB_OUTPUT
          echo "image-tag=${{ env.REGISTRY }}/${{ github.repository }}/keycloak-${{ matrix.client }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./clients/${{ matrix.client }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image-tag }}:${{ steps.meta.outputs.keycloak-version }}
            ${{ steps.meta.outputs.image-tag }}:${{ steps.meta.outputs.keycloak-version }}-${{ github.sha }}
            ${{ steps.meta.outputs.image-tag }}:latest
          labels: |
            org.opencontainers.image.title=Keycloak-${{ matrix.client }}
            org.opencontainers.image.version=${{ steps.meta.outputs.keycloak-version }}
            org.opencontainers.image.vendor=Your-Company

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}