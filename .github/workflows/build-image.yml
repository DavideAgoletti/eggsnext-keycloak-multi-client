name: Build Keycloak Images
true:
  push:
    branches:
    - main
    paths:
    - clients/**
  workflow_dispatch:
    inputs:
      client:
        description: "\U0001F3AF Seleziona cliente"
        required: true
        type: choice
        options:
        - all
      keycloak_version:
        description: "\U0001F4E6 Seleziona versione Keycloak (aggiornate quotidianamente)"
        required: true
        type: choice
        options:
        - 26.6.1
env:
  REGISTRY: ghcr.io
jobs:
  fetch-clients:
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.clients.outputs.list }}
    steps:
    - uses: actions/checkout@v4
    - name: List clients
      id: clients
      run: 'CLIENTS=$(ls -d clients/*/ 2>/dev/null | sed ''s|clients/||g'' | sed ''s|/||g''
        | sort | jq -R -s -c ''split("\n")[:-1]'')

        echo "list=$CLIENTS" >> $GITHUB_OUTPUT

        '
  detect-clients:
    needs: fetch-clients
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.data }}
    steps:
    - name: Generate matrix
      id: matrix
      run: "if [ \"${{ github.event.inputs.client }}\" = \"all\" ]; then\n  MATRIX='${{\
        \ needs.fetch-clients.outputs.clients }}'\nelse\n  MATRIX='[\"${{ github.event.inputs.client\
        \ }}\"]'\nfi\necho \"data={\\\"client\\\":$(echo $MATRIX | jq -c .)}\" >>\
        \ $GITHUB_OUTPUT\n"
  build:
    needs: detect-clients
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-clients.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./clients/${{ matrix.client }}
        push: true
        build-args: 'KEYCLOAK_VERSION=${{ github.event.inputs.keycloak_version }}

          '
        tags: '${{ env.REGISTRY }}/${{ github.repository }}/keycloak-${{ matrix.client
          }}:${{ github.event.inputs.keycloak_version }}

          ${{ env.REGISTRY }}/${{ github.repository }}/keycloak-${{ matrix.client
          }}:${{ github.event.inputs.keycloak_version }}-${{ github.sha }}

          ${{ env.REGISTRY }}/${{ github.repository }}/keycloak-${{ matrix.client
          }}:latest

          '
        labels: 'org.opencontainers.image.title=Keycloak-${{ matrix.client }}

          org.opencontainers.image.version=${{ github.event.inputs.keycloak_version
          }}

          org.opencontainers.image.created=$(date -u +''%Y-%m-%dT%H:%M:%SZ'')

          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository
          }}

          '
    - name: Image Summary
      run: "echo \"\u2705 Build completato!\"\necho \"\"\necho \"\U0001F4CA Dettagli:\"\
        \necho \"   Cliente: ${{ matrix.client }}\"\necho \"   Versione: ${{ github.event.inputs.keycloak_version\
        \ }}\"\necho \"   Registry: ${{ env.REGISTRY }}\""
